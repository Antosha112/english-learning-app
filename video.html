<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видео - My Learning English</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        /* Общие стили как в лексике */
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #268e96;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            color: #1a6b72;
        }
        
        .add-form {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .add-form input, .add-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .add-form input:focus, .add-form textarea:focus {
            outline: none;
            border-color: #268e96;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: #268e96;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1a6b72;
            transform: scale(1.02);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-edit {
            background: #f39c12;
            color: white;
            margin-right: 10px;
        }
        
        .btn-edit:hover {
            background: #d68910;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .video-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .video-thumbnail {
            width: 100%;
            height: 200px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #7f8c8d;
        }
        
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-info h3 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: normal;
        }
        
        .video-info p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .video-info .video-link {
            display: inline-block;
            color: #268e96;
            text-decoration: none;
            font-size: 14px;
        }
        
        .video-info .video-link:hover {
            text-decoration: underline;
        }
        
        .video-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .video-actions .btn {
            padding: 8px 16px;
            font-size: 14px;
            flex: 1;
        }
        
        .empty-message {
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
            padding: 40px;
        }
        
        .count-badge {
            display: inline-block;
            background: #e0f2f1;
            color: #268e96;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }
        
        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад к разделам</a>
        
        <h1>🎬 Видео</h1>
        <p class="subtitle">Темы для изучения с видео</p>
        
        <div style="text-align: right; color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">
            Всего: <span id="totalCount">0</span> видео
        </div>
        
        <!-- Форма добавления -->
        <div class="add-form">
            <h3 style="margin-bottom: 20px; color: #2c3e50; font-weight: normal;">➕ Добавить видео</h3>
            
            <input type="text" id="titleInput" placeholder="Название темы *">
            <input type="url" id="linkInput" placeholder="Ссылка на видео (YouTube/Vimeo) *">
            <input type="text" id="imageInput" placeholder="Ссылка на картинку (необязательно)">
            <textarea id="descriptionInput" placeholder="Описание (необязательно)" rows="3"></textarea>
            
            <button class="btn btn-primary" id="addBtn">➕ Добавить</button>
            <button class="btn" id="cancelEditBtn" style="display: none; background: #95a5a6; color: white; margin-left: 10px;">Отменить</button>
        </div>
        
        <!-- Список видео -->
        <div id="videoList" class="video-grid">
            <!-- Сюда будут добавляться видео через JavaScript -->
        </div>
        
        <p style="margin-top: 40px; color: #607f94; font-size: 14px;">
            Сделано с ❤️ для изучения английского
        </p>
    </div>
    
    <script>
        const STORAGE_KEY = 'english_videos';
        let editingId = null;
        
        function getVideos() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function saveVideos(videos) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(videos));
        }
        
        function generateId() {
            return Date.now() + Math.floor(Math.random() * 1000);
        }
        
        function addVideo(title, link, image, description) {
            const videos = getVideos();
            
            const newVideo = {
                id: generateId(),
                title: title.trim(),
                link: link.trim(),
                image: image.trim() || '',
                description: description.trim() || '',
                date: new Date().toLocaleDateString('ru-RU')
            };
            
            videos.push(newVideo);
            saveVideos(videos);
            renderVideos();
            clearForm();
        }
        
        function editVideo(id) {
            const videos = getVideos();
            const video = videos.find(v => v.id === id);
            
            if (!video) return;
            
            document.getElementById('titleInput').value = video.title;
            document.getElementById('linkInput').value = video.link;
            document.getElementById('imageInput').value = video.image || '';
            document.getElementById('descriptionInput').value = video.description || '';
            
            document.getElementById('addBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            editingId = id;
        }
        
        function updateVideo(id, title, link, image, description) {
            const videos = getVideos();
            const index = videos.findIndex(v => v.id === id);
            
            if (index === -1) return;
            
            videos[index] = {
                ...videos[index],
                title: title.trim(),
                link: link.trim(),
                image: image.trim() || '',
                description: description.trim() || ''
            };
            
            saveVideos(videos);
            renderVideos();
            clearForm();
            cancelEdit();
        }
        
        function deleteVideo(id) {
            if (!confirm('Точно удалить это видео?')) return;
            
            const videos = getVideos();
            const filtered = videos.filter(v => v.id !== id);
            saveVideos(filtered);
            renderVideos();
        }
        
        function cancelEdit() {
            editingId = null;
            document.getElementById('addBtn').textContent = '➕ Добавить';
            document.getElementById('cancelEditBtn').style.display = 'none';
            clearForm();
        }
        
        function clearForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('linkInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('descriptionInput').value = '';
        }
        
        function getYouTubeThumbnail(url) {
            // Пытаемся извлечь ID видео из ссылки YouTube
            const patterns = [
                /(?:youtube\.com\/watch\?v=)([\w-]+)/,
                /(?:youtu\.be\/)([\w-]+)/,
                /(?:youtube\.com\/embed\/)([\w-]+)/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) {
                    return `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`;
                }
            }
            return null;
        }
        
        function renderVideos() {
            const videos = getVideos();
            const list = document.getElementById('videoList');
            const totalSpan = document.getElementById('totalCount');
            
            totalSpan.textContent = videos.length;
            
            if (videos.length === 0) {
                list.innerHTML = `
                    <div class="empty-message" style="grid-column: 1 / -1;">
                        📭 Пока нет видео. Добавь первое!
                    </div>
                `;
                return;
            }
            
            list.innerHTML = videos.map(video => {
                let thumbnail = video.image || getYouTubeThumbnail(video.link) || '';
                let thumbnailHtml = thumbnail 
                    ? `<img src="${thumbnail}" alt="${video.title}">` 
                    : '<span>🎬</span>';
                
                return `
                    <div class="video-card">
                        <div class="video-thumbnail">
                            ${thumbnailHtml}
                        </div>
                        <div class="video-info">
                            <h3>${escapeHtml(video.title)}</h3>
                            <p>${escapeHtml(video.description) || 'Нет описания'}</p>
                            <a href="${escapeHtml(video.link)}" target="_blank" class="video-link">▶️ Смотреть видео</a>
                            <div style="font-size: 12px; color: #95a5a6; margin-top: 5px;">
                                📅 ${video.date || 'Неизвестно'}
                            </div>
                            <div class="video-actions">
                                <button class="btn btn-edit" onclick="editVideo(${video.id})">✏️</button>
                                <button class="btn btn-danger" onclick="deleteVideo(${video.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработчики событий
        document.getElementById('addBtn').addEventListener('click', function() {
            const title = document.getElementById('titleInput').value;
            const link = document.getElementById('linkInput').value;
            const image = document.getElementById('imageInput').value;
            const description = document.getElementById('descriptionInput').value;
            
            if (!title.trim() || !link.trim()) {
                alert('Пожалуйста, заполни название и ссылку!');
                return;
            }
            
            if (editingId !== null) {
                updateVideo(editingId, title, link, image, description);
            } else {
                addVideo(title, link, image, description);
            }
        });
        
        document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
        
        // Enter для быстрого добавления
        document.getElementById('titleInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('linkInput').focus();
        });
        
        document.getElementById('linkInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('imageInput').focus();
        });
        
        document.getElementById('imageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('descriptionInput').focus();
        });
        
        document.getElementById('descriptionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('addBtn').click();
            }
        });
        
        // Загрузка
        renderVideos();
        
        // Добавим примеры для теста
        const testVideos = getVideos();
        if (testVideos.length === 0) {
            addVideo(
                'Present Simple - настоящее простое время',
                'https://www.youtube.com/watch?v=ZjaqJm3_tLg',
                '',
                'Отличное объяснение Present Simple от учителя с примерами.'
            );
            addVideo(
                'Как говорить о погоде на английском',
                'https://www.youtube.com/watch?v=oXrWJjWqKzQ',
                '',
                'Полезные фразы для разговора о погоде.'
            );
        }
    </script>
</body>
</html>
