<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Песни - My Learning English</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #268e96;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            color: #1a6b72;
        }
        
        .add-form {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .add-form input, .add-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        
        .add-form input:focus, .add-form textarea:focus {
            outline: none;
            border-color: #268e96;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-primary {
            background: #268e96;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1a6b72;
            transform: scale(1.02);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-edit {
            background: #f39c12;
            color: white;
            margin-right: 10px;
        }
        
        .btn-edit:hover {
            background: #d68910;
        }
        
        .song-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .song-card:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .song-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .song-title h3 {
            font-size: 24px;
            color: #2c3e50;
            font-weight: normal;
            margin-bottom: 5px;
        }
        
        .song-title .artist {
            color: #7f8c8d;
            font-size: 16px;
        }
        
        .song-lyrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }
        
        .song-lyrics .column {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .song-lyrics .column h4 {
            color: #2c3e50;
            font-weight: normal;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
        }
        
        .song-lyrics .column p {
            color: #2c3e50;
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 15px;
        }
        
        .song-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .song-actions .btn {
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .empty-message {
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
            padding: 40px;
        }
        
        @media (max-width: 768px) {
            .song-lyrics {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .song-header {
                flex-direction: column;
            }
            
            .song-actions {
                width: 100%;
            }
            
            .song-actions .btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Назад к разделам</a>
        
        <h1>🎵 Песни</h1>
        <p class="subtitle">Перевод и разбор песен</p>
        
        <div style="text-align: right; color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">
            Всего: <span id="totalCount">0</span> песен
        </div>
        
        <div class="add-form">
            <h3 style="margin-bottom: 20px; color: #2c3e50; font-weight: normal;">🎤 Добавить песню</h3>
            
            <input type="text" id="titleInput" placeholder="Название песни *">
            <input type="text" id="artistInput" placeholder="Исполнитель *">
            <textarea id="englishLyrics" placeholder="Текст на английском *" rows="6"></textarea>
            <textarea id="russianLyrics" placeholder="Перевод на русский *" rows="6"></textarea>
            
            <button class="btn btn-primary" id="addBtn">➕ Добавить</button>
            <button class="btn" id="cancelEditBtn" style="display: none; background: #95a5a6; color: white; margin-left: 10px;">Отменить</button>
        </div>
        
        <div id="songList">
            <!-- Сюда будут добавляться песни -->
        </div>
        
        <p style="margin-top: 40px; color: #607f94; font-size: 14px;">
            Сделано с ❤️ для изучения английского
        </p>
    </div>
    
    <script>
        const STORAGE_KEY = 'english_songs';
        let editingId = null;
        
        function getSongs() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function saveSongs(songs) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(songs));
        }
        
        function generateId() {
            return Date.now() + Math.floor(Math.random() * 1000);
        }
        
        function addSong(title, artist, english, russian) {
            const songs = getSongs();
            
            const newSong = {
                id: generateId(),
                title: title.trim(),
                artist: artist.trim(),
                english: english.trim(),
                russian: russian.trim(),
                date: new Date().toLocaleDateString('ru-RU')
            };
            
            songs.push(newSong);
            saveSongs(songs);
            renderSongs();
            clearForm();
        }
        
        function editSong(id) {
            const songs = getSongs();
            const song = songs.find(s => s.id === id);
            
            if (!song) return;
            
            document.getElementById('titleInput').value = song.title;
            document.getElementById('artistInput').value = song.artist;
            document.getElementById('englishLyrics').value = song.english;
            document.getElementById('russianLyrics').value = song.russian;
            
            document.getElementById('addBtn').textContent = '💾 Сохранить';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            editingId = id;
        }
        
        function updateSong(id, title, artist, english, russian) {
            const songs = getSongs();
            const index = songs.findIndex(s => s.id === id);
            
            if (index === -1) return;
            
            songs[index] = {
                ...songs[index],
                title: title.trim(),
                artist: artist.trim(),
                english: english.trim(),
                russian: russian.trim()
            };
            
            saveSongs(songs);
            renderSongs();
            clearForm();
            cancelEdit();
        }
        
        function deleteSong(id) {
            if (!confirm('Точно удалить эту песню?')) return;
            
            const songs = getSongs();
            const filtered = songs.filter(s => s.id !== id);
            saveSongs(filtered);
            renderSongs();
        }
        
        function cancelEdit() {
            editingId = null;
            document.getElementById('addBtn').textContent = '➕ Добавить';
            document.getElementById('cancelEditBtn').style.display = 'none';
            clearForm();
        }
        
        function clearForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('artistInput').value = '';
            document.getElementById('englishLyrics').value = '';
            document.getElementById('russianLyrics').value = '';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderSongs() {
            const songs = getSongs();
            const list = document.getElementById('songList');
            const totalSpan = document.getElementById('totalCount');
            
            totalSpan.textContent = songs.length;
            
            if (songs.length === 0) {
                list.innerHTML = `
                    <div class="empty-message">
                        📭 Пока нет песен. Добавь первую!
                    </div>
                `;
                return;
            }
            
            list.innerHTML = songs.map(song => `
                <div class="song-card">
                    <div class="song-header">
                        <div class="song-title">
                            <h3>🎵 ${escapeHtml(song.title)}</h3>
                            <div class="artist">${escapeHtml(song.artist)}</div>
                            <div style="font-size: 12px; color: #95a5a6; margin-top: 5px;">
                                📅 ${song.date || 'Неизвестно'}
                            </div>
                        </div>
                        <div class="song-actions">
                            <button class="btn btn-edit" onclick="editSong(${song.id})">✏️</button>
                            <button class="btn btn-danger" onclick="deleteSong(${song.id})">🗑️</button>
                        </div>
                    </div>
                    <div class="song-lyrics">
                        <div class="column">
                            <h4>🇬🇧 English</h4>
                            <p>${escapeHtml(song.english)}</p>
                        </div>
                        <div class="column">
                            <h4>🇷🇺 Русский</h4>
                            <p>${escapeHtml(song.russian)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // Обработчики
        document.getElementById('addBtn').addEventListener('click', function() {
            const title = document.getElementById('titleInput').value;
            const artist = document.getElementById('artistInput').value;
            const english = document.getElementById('englishLyrics').value;
            const russian = document.getElementById('russianLyrics').value;
            
            if (!title.trim() || !artist.trim() || !english.trim() || !russian.trim()) {
                alert('Пожалуйста, заполни все поля!');
                return;
            }
            
            if (editingId !== null) {
                updateSong(editingId, title, artist, english, russian);
            } else {
                addSong(title, artist, english, russian);
            }
        });
        
        document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);
        
        // Загрузка
        renderSongs();
        
        // Тестовые данные
        const testSongs = getSongs();
        if (testSongs.length === 0) {
            addSong(
                'Yesterday',
                'The Beatles',
                'Yesterday all my troubles seemed so far away\nNow it looks as though they\'re here to stay\nOh, I believe in yesterday',
                'Вчера все мои проблемы казались такими далекими\nТеперь похоже, что они останутся здесь надолго\nО, я верю вчера'
            );
            addSong(
                'My Heart Will Go On',
                'Celine Dion',
                'Near, far, wherever you are\nI believe that the heart does go on\nOnce more you open the door\nAnd you\'re here in my heart',
                'Близко, далеко, где бы ты ни был\nЯ верю, что сердце продолжает жить\nСнова ты открываешь дверь\nИ ты здесь, в моем сердце'
            );
        }
    </script>
</body>
</html>
